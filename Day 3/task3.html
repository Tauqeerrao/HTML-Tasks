<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin Examples</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f8f9fa;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .box {
            padding: 20px;
            background: #007bff;
            color: white;
            border-radius: 8px;
        }
        .margin-small { margin: 10px; }
        .margin-medium { margin: 30px; }
        .margin-large { margin: 50px; }
        .margin-auto { margin: auto; width: 50%; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Margin Examples</h2>
        <div class="box margin-small">Small Margin (10px)</div>
        <div class="box margin-medium">Medium Margin (30px)</div>
        <div class="box margin-large">Large Margin (50px)</div>
        <div class="box margin-auto">Auto Margin (Centered)</div>
    </div>
</body>
</html>
